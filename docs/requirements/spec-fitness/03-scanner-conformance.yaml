requirements:
  - id: WL-FIT-SCAN-001
    title: Implemented rule set is declared
    statement: >
      The scanner MUST declare which canonical rule IDs it implements and must
      not advertise pseudo-rule or governance-diagnostic IDs as normative rule
      coverage.
    normative_sources:
      - file: docs/spec/wardline-01-14-conformance.md
        section: "14.3.1 Enforcement profiles"
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
    verification:
      method: static_review_and_unit_tests
      target_paths:
        - src/wardline/scanner/rules/__init__.py
        - src/wardline/scanner/sarif.py
        - tests/unit/scanner/test_rules.py
        - tests/unit/scanner/test_registry_sync.py
    fitness_dimensions: [conformance, interoperability]
    notes: A clear rule inventory is required for honest conformance claims.

  - id: WL-FIT-SCAN-002
    title: Pattern and structural rules are enforced by tests
    statement: >
      The Python scanner MUST have test coverage for each implemented
      rule-specific behavior it claims as authoritative, including delegated
      validation and validation-ordering behaviors where implemented.
    normative_sources:
      - file: docs/spec/wardline-01-14-conformance.md
        section: "14.2 Conformance criteria"
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
    verification:
      method: unit_tests_and_corpus_review
      target_paths:
        - src/wardline/scanner/rules
        - tests/unit/scanner
        - corpus/specimens
    fitness_dimensions: [correctness, conformance]
    notes: Use the project’s declared rule set, not a theoretical future rule set.

  - id: WL-FIT-SCAN-003
    title: Two-hop taint and delegated validation are assessable
    statement: >
      If the scanner claims support for taint-flow tracking or delegated WL-007
      satisfaction, it MUST test direct flows, two-hop intermediary flows, and
      convergence behavior explicitly.
    normative_sources:
      - file: docs/spec/wardline-01-14-conformance.md
        section: "14.2 Conformance criteria"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/scanner/taint
        - tests/unit/scanner/test_taint.py
        - tests/unit/scanner/test_engine_l3.py
        - tests/unit/scanner/test_delegated_rejection.py
        - tests/unit/scanner/test_rejection_path_convergence.py
    fitness_dimensions: [correctness, conformance]
    notes: This is one of the most important fitness checks for higher-assurance scanning.

  - id: WL-FIT-SCAN-004
    title: SARIF output carries the required Wardline property bags
    statement: >
      SARIF output MUST be valid SARIF v2.1.0 and include the Wardline-specific
      result-level and run-level property bags required by the spec.
    normative_sources:
      - file: docs/spec/wardline-01-10-verification-properties.md
        section: "10.1 Findings interchange format"
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
    verification:
      method: unit_tests_and_fixture_validation
      target_paths:
        - src/wardline/scanner/sarif.py
        - tests/unit/scanner/test_sarif.py
        - tests/integration/test_scan_cmd.py
    fitness_dimensions: [interoperability, conformance]
    notes: This requirement covers property-bag completeness, not just JSON serialisation.

  - id: WL-FIT-SCAN-005
    title: Precision and recall are measured per cell
    statement: >
      The implementation MUST measure, track, and publish precision and recall
      against the golden corpus per rule-by-taint-state cell for the rules it
      claims to implement.
    normative_sources:
      - file: docs/spec/wardline-01-14-conformance.md
        section: "14.2 Conformance criteria"
      - file: docs/spec/wardline-01-10-verification-properties.md
        section: "10. Verification properties"
    verification:
      method: corpus_cli_and_reporting_review
      target_paths:
        - src/wardline/cli/corpus_cmds.py
        - tests/unit/scanner/test_corpus_runner.py
        - tests/integration/test_corpus_verify.py
    fitness_dimensions: [conformance, assessability]
    notes: Per-rule or ad hoc metrics are weaker than the spec’s per-cell requirement.

  - id: WL-FIT-SCAN-006
    title: Corpus exists for claimed coverage
    statement: >
      A golden corpus of labeled specimens MUST exist for the scanner behaviors it
      claims, including adversarial specimens where the spec requires them, and
      corpus verification MUST be runnable from the repo.
    normative_sources:
      - file: docs/spec/wardline-01-10-verification-properties.md
        section: "10. Verification properties"
      - file: docs/spec/wardline-01-14-conformance.md
        section: "14.2 Conformance criteria"
    verification:
      method: corpus_and_cli_tests
      target_paths:
        - corpus/specimens
        - src/wardline/cli/corpus_cmds.py
        - tests/unit/scanner/test_corpus_runner.py
        - tests/unit/corpus/test_corpus_skeleton.py
    fitness_dimensions: [conformance, maintainability]
    notes: Coverage claims without a maintained corpus are weak evidence.

  - id: WL-FIT-SCAN-007
    title: Self-hosting gate is substantive
    statement: >
      Where the scanner is implemented in the language it analyses, the project
      MUST verify that the scanner passes the rules it implements on its own
      source, not merely that self-hosting can be observed.
    normative_sources:
      - file: docs/spec/wardline-01-14-conformance.md
        section: "14.2 Conformance criteria"
    verification:
      method: cli_review_and_tests
      target_paths:
        - src/wardline/cli/scan.py
        - tests/integration/test_self_hosting.py
        - tests/integration/test_self_hosting_scan.py
        - docs/audits
    fitness_dimensions: [conformance, fitness_signal]
    notes: A stability-only self-hosting check is weaker than the conformance criterion.

  - id: WL-FIT-SCAN-008
    title: Manifest-validation responsibility and conformance surface are documented honestly
    statement: >
      The implementation MUST accurately document which normative capabilities it
      provides directly, which depend on a companion governance tool, and any
      remaining conformance gaps or delegated validation responsibility.
    normative_sources:
      - file: docs/spec/wardline-01-14-conformance.md
        section: "14.2 Conformance criteria"
      - file: docs/spec/wardline-01-14-conformance.md
        section: "14.3.1 Enforcement profiles"
    verification:
      method: documentation_review
      target_paths:
        - docs/spec/wardline-02-A-python-binding.md
        - src/wardline/cli
        - src/wardline/scanner
    fitness_dimensions: [conformance, governance]
    notes: Machine-readable conformance surfaces should not imply zero gaps when tracked gaps remain.

  - id: WL-FIT-SCAN-009
    title: Living pattern catalogue with version-tracked semantic equivalents
    statement: >
      Language bindings MUST maintain version-tracked lists of semantic
      equivalents for each pattern rule, extending detection coverage as new
      evasion variants are identified. The precision/recall corpus SHOULD
      include evasion-variant specimens alongside standard specimens.
    normative_sources:
      - file: docs/spec/wardline-01-07-pattern-rules.md
        section: "7. Pattern rules"
    verification:
      method: documentation_and_corpus_review
      target_paths:
        - docs/spec/semantic-equivalents
        - corpus/specimens
        - src/wardline/scanner/rules
    fitness_dimensions: [conformance, maintainability]
    notes: >
      The semantic-equivalents directory in docs/spec tracks this. Verify that
      each implemented rule has a corresponding equivalents list and that
      corpus specimens exercise them.

  - id: WL-FIT-SCAN-010
    title: Taint propagation correctness (verification property 6)
    statement: >
      The taint propagation engine MUST correctly assign taint states to values
      at merge points and across function boundaries. Taint-flow corpus
      specimens MUST test: direct boundary-to-boundary flows, two-hop
      indirection through undecorated helpers, and container-level taint
      contamination.
    normative_sources:
      - file: docs/spec/wardline-01-10-verification-properties.md
        section: "10. Verification properties"
    verification:
      method: unit_tests_and_corpus
      target_paths:
        - src/wardline/scanner/taint
        - tests/unit/scanner/test_taint.py
        - tests/unit/scanner/test_engine_l3.py
        - corpus/specimens
    fitness_dimensions: [correctness, conformance]
    notes: >
      This is distinct from SCAN-003 (which tests scanner behavior). Property 6
      specifically requires corpus specimens of category taint_flow that test
      propagation correctness independently of rule firing.

  - id: WL-FIT-SCAN-011
    title: Corpus independence requirements
    statement: >
      The golden corpus MUST satisfy independence requirements: separate
      publication as a versioned artefact, version binding to a specification
      version, integrity verification via specimen hash manifest, and
      reproducible evaluation via a corpus verify command.
    normative_sources:
      - file: docs/spec/wardline-01-10-verification-properties.md
        section: "10. Verification properties"
    verification:
      method: corpus_and_cli_review
      target_paths:
        - corpus/specimens
        - src/wardline/cli/corpus_cmds.py
        - tests/integration/test_corpus_verify.py
    fitness_dimensions: [conformance, assessability]
    notes: >
      At DRAFT v0.2.0, the corpus is maintained alongside the spec and is not
      yet independently published. Full independence requirements apply from v1.0.
      Verify that the existing corpus infrastructure supports the path to independence.

  - id: WL-FIT-SCAN-012
    title: Rejection path definition is precise
    statement: >
      The scanner MUST correctly classify rejection paths: exception-raising
      statements, guarded early returns, and resolvable two-hop delegation
      constitute rejection paths. Assertions MUST NOT be counted as rejection
      paths. Statically unreachable rejection paths (constant-False guards)
      SHOULD be detected and treated as absent.
    normative_sources:
      - file: docs/spec/wardline-01-07-pattern-rules.md
        section: "7.2 Structural verification"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/scanner/rules/py_wl_007.py
        - tests/unit/scanner/test_py_wl_007.py
    fitness_dimensions: [correctness, conformance]
    notes: >
      This refines SCAN-002 and SCAN-003 by specifically testing the rejection
      path classification logic, including the assertion exclusion and
      unreachable-path detection.

  - id: WL-FIT-SCAN-013
    title: WL-001 optional-field suppression follows three conditions
    statement: >
      WL-001 is SUPPRESS when three conditions are met simultaneously:
      (1) the field is declared optional-by-contract in the overlay,
      (2) the actual default matches the declared approved default exactly,
      and (3) the access occurs within a declared validation or normalisation
      boundary. A default that differs from the approved default produces
      ERROR/UNCONDITIONAL (stronger than the undeclared case).
    normative_sources:
      - file: docs/spec/wardline-01-07-pattern-rules.md
        section: "7.2.1 Structural-guarantee defaults and WL-001"
    verification:
      method: unit_tests_and_corpus
      target_paths:
        - src/wardline/scanner/rules/py_wl_001.py
        - tests/unit/scanner/test_py_wl_001.py
        - corpus/specimens
    fitness_dimensions: [correctness, conformance]
    notes: >
      The corpus should include suppression_interaction specimens: one negative
      (all three conditions met), one positive (default mismatch), one positive
      (correct default but outside boundary).

  - id: WL-FIT-SCAN-014
    title: Binding matrix deviations are narrowing-only
    statement: >
      Language bindings MAY modify individual severity matrix cells where the
      target language's type system structurally prevents a violation class.
      Binding-level deviations MUST narrow severity or exceptionability
      relative to the framework matrix, not widen them.
    normative_sources:
      - file: docs/spec/wardline-01-07-pattern-rules.md
        section: "7.3 Severity matrix"
    verification:
      method: static_review
      target_paths:
        - src/wardline/core/matrix.py
        - docs/spec/wardline-02-A-python-binding.md
    fitness_dimensions: [conformance, safety]
    notes: >
      Verify that any Python binding matrix deviations from the framework
      matrix are documented and narrowing-only.

  - id: WL-FIT-SCAN-015
    title: Group 2 audit-primacy ordering verification
    statement: >
      Conformant scanners SHALL verify audit-primacy ordering within a single
      function using path-sensitive analysis. The analysis scope includes
      conditionals, loops, early returns, exception edges, and local helper
      calls. Interprocedural ordering through callbacks, dynamic dispatch, or
      higher-order functions is outside required scope.
    normative_sources:
      - file: docs/spec/wardline-01-06-annotation-vocabulary.md
        section: "6. Annotation vocabulary"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/scanner/rules
        - tests/unit/scanner
    fitness_dimensions: [correctness, conformance]
    notes: >
      Group 2 specifies that integral_writer calls must dominate telemetry
      on shared execution paths. Path-sensitive analysis means all code
      paths are considered, not just the happy path.

  - id: WL-FIT-SCAN-016
    title: Group 5 schema contract field-completeness verification
    statement: >
      Conformant scanners SHALL verify that all fields of the source type
      are accessed in functions declared as performing complete field mapping
      (e.g., @all_fields_mapped in the Python binding). Unmapped fields
      produce a finding. Multiple functions declaring the same output field
      produce a collision finding. Schema-level defaults on fields in
      tier-classified flows MUST be treated as implicit optional-field
      declarations under the Assurance governance profile.
    normative_sources:
      - file: docs/spec/wardline-01-06-annotation-vocabulary.md
        section: "6. Annotation vocabulary"
    informative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.4.2 Decorator mapping table"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/scanner/rules
        - tests/unit/scanner
    fitness_dimensions: [correctness, conformance]
    notes: >
      The schema_default() governance requirement for Assurance creates a
      link between Group 5 and the governance profile.

  - id: WL-FIT-SCAN-017
    title: Group 12 determinism scope verification
    statement: >
      Conformant scanners SHALL verify that @deterministic-annotated
      functions do not contain direct calls to binding-defined
      non-deterministic operations. Indirect calls through callbacks,
      higher-order functions, dynamic dispatch, or reflection are outside
      required scope.
    normative_sources:
      - file: docs/spec/wardline-01-06-annotation-vocabulary.md
        section: "6. Annotation vocabulary"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/scanner/rules
        - tests/unit/scanner
    fitness_dimensions: [correctness, conformance]
    notes: >
      The Python binding specifies a ban list: random, uuid4, datetime.now,
      set iteration. Bindings MAY extend detection depth.

  - id: WL-FIT-SCAN-018
    title: Specimen schema and fragment requirements
    statement: >
      Each corpus specimen MUST be a self-contained YAML file with required
      fields: id, rule, taint_state, expected_severity,
      expected_exceptionability, verdict, fragment, and expected_match.
      Fragments MUST be syntactically valid compilation units including
      wardline decorator imports and MUST NOT depend on external state.
    normative_sources:
      - file: docs/spec/wardline-01-10-verification-properties.md
        section: "10. Verification properties"
    verification:
      method: corpus_and_schema_review
      target_paths:
        - corpus/specimens
        - tests/unit/corpus/test_corpus_skeleton.py
    fitness_dimensions: [conformance, assessability]
    notes: >
      The expected_match text MUST match the SARIF snippet.text exactly.
      Verify existing specimens conform to the normative specimen schema.

  - id: WL-FIT-SCAN-019
    title: Minimum adversarial and suppression interaction specimens
    statement: >
      The corpus MUST include adversarial specimens: at least 1
      adversarial_false_positive and 1 adversarial_false_negative per rule
      (8 minimum each), targeting known false-positive and evasion patterns.
      At least 3 suppression_interaction specimens MUST test WL-001
      optional-field suppression.
    normative_sources:
      - file: docs/spec/wardline-01-10-verification-properties.md
        section: "10. Verification properties"
    verification:
      method: corpus_review
      target_paths:
        - corpus/specimens
    fitness_dimensions: [conformance, assessability]
    notes: >
      This refines SCAN-006 with specific adversarial counts from the spec.
      Suppression interaction specimens test the three-condition rule:
      one negative (all met), one positive (default mismatch), one positive
      (outside boundary).

  - id: WL-FIT-SCAN-020
    title: Group 13 concurrency enforcement scope is documented
    statement: >
      A binding claiming enforcement for Group 13 (concurrency/ordering)
      SHALL document the required minimum scope for each declaration type
      (@thread_safe, @ordered_after, @not_reentrant). Tools MAY provide
      advisory-only checks beyond that scope.
    normative_sources:
      - file: docs/spec/wardline-01-06-annotation-vocabulary.md
        section: "6. Annotation vocabulary"
    verification:
      method: documentation_review
      target_paths:
        - docs/spec/wardline-02-A-python-binding.md
        - src/wardline/scanner/rules
    fitness_dimensions: [conformance, honesty]
    notes: >
      The minimum analysis scope is binding-defined. If the Python binding
      claims Group 13 enforcement, the scope must be documented.
