requirements:
  - id: WL-FIT-PY-001
    title: Decorator discovery is AST-based
    statement: >
      The Python Wardline-Core implementation MUST discover wardline decorators
      from the target codebase's AST and MUST NOT rely on runtime introspection
      as its primary discovery mechanism.
    normative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
    verification:
      method: static_review_and_unit_tests
      target_paths:
        - src/wardline/scanner/discovery.py
        - src/wardline/scanner/context.py
        - tests/unit/test_wp04_hardening.py
    fitness_dimensions: [correctness, interoperability]
    notes: Runtime metadata helpers may exist, but they are not the normative discovery path.

  - id: WL-FIT-PY-002
    title: "`schema_default()` is recognised as the governed default marker"
    statement: >
      The Python implementation MUST recognise `schema_default()` as the
      PY-WL-001 suppression marker and only treat it as governed when the
      overlay declaration supports it.
    normative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
    verification:
      method: static_review_and_unit_tests
      target_paths:
        - src/wardline/decorators/schema.py
        - src/wardline/scanner/rules/py_wl_001.py
        - tests/unit/scanner/test_py_wl_001.py
    fitness_dimensions: [correctness, conformance]
    notes: This is a Python-specific part of the normative Wardline-Core interface contract.

  - id: WL-FIT-PY-003
    title: Mandatory result-level SARIF properties are emitted
    statement: >
      Each finding emitted by the Python Wardline-Core implementation MUST carry
      the mandatory result-level property bag fields required by the Python
      interface contract.
    normative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/scanner/sarif.py
        - tests/unit/scanner/test_sarif.py
    fitness_dimensions: [correctness, interoperability]
    notes: This requirement is satisfied by the specific A.3 result keys, not by the full Part I result bag.

  - id: WL-FIT-PY-004
    title: Decorator composition semantics are honoured
    statement: >
      The Python implementation MUST honour the binding’s normative decorator
      composition semantics, including the rule that `@int_data` alone produces
      `UNKNOWN_RAW` and only composition with `@restoration_boundary` can
      restore a higher effective tier according to the Part I evidence matrix.
    normative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
    informative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.4.2 Decorator mapping table"
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.4.3 Non-obvious design rationale"
    verification:
      method: runtime_and_scanner_tests
      target_paths:
        - src/wardline/decorators
        - src/wardline/core/registry.py
        - tests/unit/decorators
        - tests/unit/scanner/test_py_wl_007.py
    fitness_dimensions: [correctness, conformance]
    notes: This is the binding-side bridge between Part I restoration semantics and Python syntax.

  - id: WL-FIT-PY-005
    title: Unresolvable third-party delegation is handled conservatively
    statement: >
      When third-party source is unavailable or delegation resolution is not
      implemented, the Python implementation MUST treat the delegation as
      unresolvable for minimum-conformance purposes and evaluate the boundary
      conservatively.
    normative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
    verification:
      method: rule_tests
      target_paths:
        - src/wardline/scanner/rejection_path.py
        - tests/unit/scanner/test_delegated_rejection.py
        - tests/unit/scanner/test_rejection_path_convergence.py
    fitness_dimensions: [correctness, robustness]
    notes: Optional deeper resolution is a SHOULD; conservative fallback is the MUST.

  - id: WL-FIT-PY-006
    title: Implemented rules and binding corpus are declared
    statement: >
      The Python implementation MUST declare which rules it implements and MUST
      maintain corpus specimens for those rules.
    normative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
    verification:
      method: rule_registry_and_corpus_review
      target_paths:
        - src/wardline/scanner/rules/__init__.py
        - src/wardline/scanner/sarif.py
        - corpus/specimens
        - tests/unit/scanner/test_rules.py
    fitness_dimensions: [conformance, interoperability]
    notes: This overlaps with scanner conformance, but remains part of the Python interface contract.

  - id: WL-FIT-PY-007
    title: Verification mode exists and is deterministic
    statement: >
      The Python implementation MUST support `--verification-mode` and MUST
      produce deterministic byte-identical SARIF for identical input in that
      mode.
    normative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
      - file: docs/spec/wardline-01-10-verification-properties.md
        section: "10. Verification properties"
    verification:
      method: integration_tests
      target_paths:
        - src/wardline/cli/scan.py
        - tests/integration/test_determinism.py
        - tests/integration/test_self_hosting.py
    fitness_dimensions: [conformance, assessability]
    notes: This requirement is about repeatability, not completeness of the property bag.

  - id: WL-FIT-PY-008
    title: Mandatory run-level SARIF properties are emitted
    statement: >
      The Python implementation MUST emit the required run-level SARIF
      properties from the Python interface contract, including manifest and
      input identity properties needed for independent determinism checking.
    normative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
      - file: docs/spec/wardline-01-10-verification-properties.md
        section: "10.1 Findings interchange format"
    verification:
      method: rule_registry_and_sarif_review
      target_paths:
        - src/wardline/cli/scan.py
        - src/wardline/scanner/sarif.py
        - tests/unit/scanner/test_sarif.py
        - tests/integration/test_scan_cmd.py
    fitness_dimensions: [interoperability, conformance]
    notes: Missing `wardline.inputHash` and related run properties block independent assessment.

  - id: WL-FIT-PY-009
    title: Manifest is consumed and validated before findings
    statement: >
      The Python Wardline-Core tool MUST consume the wardline manifest
      (wardline.yaml and any overlays) and validate the manifest against the
      framework's JSON Schemas before producing findings. A tool that produces
      findings without validating the manifest is non-conformant.
    normative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.3 Interface contract (Wardline-Core)"
    verification:
      method: integration_tests
      target_paths:
        - src/wardline/cli/scan.py
        - src/wardline/manifest/loader.py
        - src/wardline/manifest/schemas/wardline.schema.json
        - tests/integration/test_scan_cmd.py
    fitness_dimensions: [conformance, correctness]
    notes: >
      This is §A.3 item 1. The scanner must validate the manifest before
      producing findings, not merely load it. Distinct from MAN-001 which
      covers the loader; this covers the scanner's obligation to call
      validation before emitting results.
