requirements:
  - id: WL-FIT-CORE-001
    title: Canonical taint-state vocabulary
    statement: >
      The implementation MUST use the canonical machine-facing taint-state tokens
      `INTEGRAL`, `ASSURED`, `GUARDED`, `EXTERNAL_RAW`,
      `UNKNOWN_RAW`, `UNKNOWN_GUARDED`, `UNKNOWN_ASSURED`,
      and `MIXED_RAW` consistently across code, schemas, and SARIF output.
    normative_sources:
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.1 Trust classification and validation status"
    verification:
      method: static_review_and_unit_tests
      target_paths:
        - src/wardline/core/taints.py
        - src/wardline/scanner/sarif.py
        - tests/unit/core/test_taints.py
        - tests/unit/scanner/test_sarif.py
    fitness_dimensions: [correctness, interoperability]
    notes: A mismatch here breaks cross-tool conformance and SARIF consumers.

  - id: WL-FIT-CORE-002
    title: Taint join algebra
    statement: >
      The taint join operation MUST be commutative, associative, idempotent, and
      treat `MIXED_RAW` as the absorbing element.
    normative_sources:
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.1 Trust classification and validation status"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/core/taints.py
        - tests/unit/core/test_taints.py
    fitness_dimensions: [correctness]
    notes: Fixed-point taint propagation depends on these algebraic guarantees.

  - id: WL-FIT-CORE-003
    title: Known-plus-unknown merges collapse conservatively
    statement: >
      Joining any known classified state with any UNKNOWN state MUST produce
      `MIXED_RAW`, not a known classified result.
    normative_sources:
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.1 Trust classification and validation status"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/core/taints.py
        - tests/unit/core/test_taints.py
    fitness_dimensions: [correctness, safety]
    notes: This is a core conservative-safety rule in the spec.

  - id: WL-FIT-CORE-004
    title: Tier-to-taint mapping is explicit
    statement: >
      The implementation MUST expose an unambiguous mapping from the four
      authority tiers to the corresponding effective taint states used by the
      scanner and severity logic.
    normative_sources:
      - file: docs/spec/wardline-01-04-authority-tier-model.md
        section: "4.1 Four tiers"
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.1 Trust classification and validation status"
    verification:
      method: static_review_and_unit_tests
      target_paths:
        - src/wardline/core/tiers.py
        - src/wardline/core/taints.py
        - tests/unit/core/test_taint_to_tier.py
    fitness_dimensions: [correctness]
    notes: This is the bridge between policy semantics and enforcement mechanics.

  - id: WL-FIT-CORE-005
    title: Severity matrix is total for implemented rule-state cells
    statement: >
      The implementation MUST define severity and exceptionability outcomes for
      every taint-state cell it claims to enforce for the implemented rules.
    normative_sources:
      - file: docs/spec/wardline-01-07-pattern-rules.md
        section: "7. Pattern rules"
      - file: docs/spec/wardline-01-14-conformance.md
        section: "14.2 Conformance criteria"
    verification:
      method: static_review_and_unit_tests
      target_paths:
        - src/wardline/core/matrix.py
        - src/wardline/core/severity.py
        - tests/unit/core/test_matrix.py
        - tests/unit/scanner/test_matrix_cells.py
    fitness_dimensions: [correctness, conformance]
    notes: Use the project’s implemented rule set rather than the whole theoretical framework.

  - id: WL-FIT-CORE-006
    title: Transition semantics prevent illegal skip-promotions
    statement: >
      Any project configuration or boundary declaration that attempts a direct
      Tier 4 to Tier 1 or Tier 3 to Tier 1 promotion MUST be rejected.
    normative_sources:
      - file: docs/spec/wardline-01-13-portability-and-manifest-format.md
        section: "13.1.2 Overlay schema"
    verification:
      method: schema_and_loader_tests
      target_paths:
        - src/wardline/manifest/models.py
        - src/wardline/manifest/loader.py
        - src/wardline/manifest/schemas/overlay.schema.json
        - tests/unit/manifest/test_loader.py
        - tests/unit/manifest/test_schemas.py
    fitness_dimensions: [safety, conformance]
    notes: This is a high-signal policy invariant and should be a hard failure.

  - id: WL-FIT-CORE-007
    title: Restoration claims are evidence-bounded
    statement: >
      Restoration boundaries MUST not claim a restored tier that exceeds the
      evidence declared for structural, semantic, integrity, and institutional
      provenance.
    normative_sources:
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.3 Trusted restoration boundaries"
      - file: docs/spec/wardline-01-13-portability-and-manifest-format.md
        section: "Restoration boundaries"
    informative_sources:
      - file: docs/spec/wardline-02-A-python-binding.md
        section: "A.4.2 Decorator mapping table"
    verification:
      method: manifest_and_rule_tests
      target_paths:
        - src/wardline/manifest/loader.py
        - src/wardline/scanner/rules/py_wl_007.py
        - tests/unit/manifest/test_coherence.py
        - tests/unit/scanner/test_py_wl_007.py
    fitness_dimensions: [safety, correctness]
    notes: Treat this as both a manifest contract and a scanner behavior requirement.

  - id: WL-FIT-CORE-008
    title: Effective states are a closed set
    statement: >
      Conformant implementations MUST treat the eight effective states as a
      closed set. No additional states may be introduced outside the binding
      extension mechanism (MIXED_TRACKED).
    normative_sources:
      - file: docs/spec/wardline-01-01-what-a-wardline-is.md
        section: "1.1 Terms and definitions"
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.1 Trust classification and validation status"
    verification:
      method: static_review_and_unit_tests
      target_paths:
        - src/wardline/core/taints.py
        - src/wardline/core/matrix.py
        - tests/unit/core/test_taints.py
    fitness_dimensions: [correctness, conformance]
    notes: The enum or equivalent must be exhaustive and not permit arbitrary extension.

  - id: WL-FIT-CORE-009
    title: Token interpretation is not narrowed
    statement: >
      Implementations MUST NOT narrow the semantics of canonical taint-state
      tokens (e.g., INTEGRAL, ASSURED) to match the everyday meaning of
      the token name. INTEGRAL encompasses all Tier 1 authoritative data,
      not only audit trails.
    normative_sources:
      - file: docs/spec/wardline-01-04-authority-tier-model.md
        section: "4.1 Four tiers"
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.1 Trust classification and validation status"
    verification:
      method: documentation_and_code_review
      target_paths:
        - src/wardline/core/taints.py
        - docs/spec/wardline-02-A-python-binding.md
    fitness_dimensions: [correctness, interoperability]
    notes: Primarily a documentation and naming review — ensure docs and code comments do not narrowly describe tokens.

  - id: WL-FIT-CORE-010
    title: Join table is normative and must not be short-circuited
    statement: >
      Implementations MUST derive the join function from the normative join
      table and MUST NOT use the trust ordering diagram to short-circuit join
      computation (e.g., by assuming join(a, b) = b when a is below b in
      the trust ordering).
    normative_sources:
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.1 Trust classification and validation status"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/core/taints.py
        - tests/unit/core/test_taints.py
    fitness_dimensions: [correctness, safety]
    notes: >
      The existing join tests (CORE-002) cover algebra properties; this
      requirement specifically tests that cross-chain joins like
      join(ASSURED, INTEGRAL) produce MIXED_RAW, not INTEGRAL.

  - id: WL-FIT-CORE-011
    title: Dependency taint compound call fallback
    statement: >
      Where an implementation cannot resolve a compound call pattern against
      dependency_taint entries, the implementation MUST fall back to
      UNKNOWN_RAW.
    normative_sources:
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.5 Third-party in-process dependency taint"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/scanner/taint
        - tests/unit/scanner/test_taint.py
    fitness_dimensions: [correctness, safety]
    notes: This is the conservative fallback for unresolvable compound patterns in third-party code.

  - id: WL-FIT-CORE-012
    title: Annotation vocabulary expressiveness (17 groups)
    statement: >
      The implementation MUST be able to express all 17 annotation vocabulary
      groups at the function, class, or field level using language-native
      mechanisms. Core classification groups (1–4, 16–17) establish the trust
      topology; supplementary contract groups (5–15) are REQUIRED for
      expressiveness conformance but need not have uniform enforcement depth.
    normative_sources:
      - file: docs/spec/wardline-01-06-annotation-vocabulary.md
        section: "6. Annotation vocabulary"
      - file: docs/spec/wardline-01-14-conformance.md
        section: "14.2 Conformance criteria"
    verification:
      method: decorator_inventory_and_review
      target_paths:
        - src/wardline/decorators
        - docs/spec/wardline-02-A-python-binding.md
    fitness_dimensions: [conformance, expressiveness]
    notes: >
      Criterion 1 of the ten conformance criteria. Current implementation
      covers core groups; supplementary group expressiveness should be
      inventoried against the full 17-group list.

  - id: WL-FIT-CORE-013
    title: Serialisation sheds direct authority
    statement: >
      Data crossing a serialisation boundary MUST shed its direct authority
      at the representation layer. Deserialised data is raw representation
      until it passes through a declared restoration boundary with adequate
      evidence (§5.3).
    normative_sources:
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.2 Transition semantics"
    verification:
      method: unit_tests_and_design_review
      target_paths:
        - src/wardline/core/taints.py
        - src/wardline/scanner/taint
        - tests/unit/scanner/test_taint.py
    fitness_dimensions: [correctness, safety]
    notes: >
      This is §5.2 invariant 5. Ensure the taint engine does not carry
      pre-serialisation tier through serialisation boundaries without
      restoration evidence.

  - id: WL-FIT-CORE-014
    title: Tier assignment is not contagious
    statement: >
      A function's tier assignment MUST NOT propagate to its callees or
      callers. Each function's tier context is determined by its own
      annotations, not inherited from call-chain position.
    normative_sources:
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.2 Transition semantics"
    verification:
      method: design_review_and_unit_tests
      target_paths:
        - src/wardline/scanner/context.py
        - src/wardline/scanner/taint
        - tests/unit/scanner/test_taint.py
    fitness_dimensions: [correctness, safety]
    notes: >
      This is §5.2 invariant 7. A Tier 1 function calling a Tier 4 adapter
      does not make the adapter Tier 1.

  - id: WL-FIT-CORE-015
    title: Cross-language taint resets to UNKNOWN_RAW
    statement: >
      Data crossing a language boundary MUST reset to UNKNOWN_RAW in the
      receiving binding unless the receiving binding can independently verify
      the emitting binding's taint assertion. The verification mechanism
      MUST be declared in the wardline manifest.
    normative_sources:
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.4 Cross-language taint propagation"
    verification:
      method: design_review
      target_paths:
        - src/wardline/manifest/models.py
        - docs/spec/wardline-02-A-python-binding.md
    fitness_dimensions: [safety, interoperability]
    notes: >
      For mono-language projects this is structural. For polyglot projects,
      verify manifest supports inter-language interface declarations.

  - id: WL-FIT-CORE-016
    title: Taint analysis scoped to explicit flows
    statement: >
      Taint analysis MUST cover explicit flows (data dependencies). Implicit
      flows (control dependencies) are not required by the framework.
      Enforcement tools SHOULD flag functions containing both a conditional
      branch whose predicate depends on a tier-classified value and an
      assignment in both branches to the same target variable
      (implicit-flow evasion heuristic).
    normative_sources:
      - file: docs/spec/wardline-01-07-pattern-rules.md
        section: "7.6 Taint analysis scope"
      - file: docs/spec/wardline-01-07-pattern-rules.md
        section: "7.6.1 Implicit-flow evasion heuristic"
    verification:
      method: code_review_and_unit_tests
      target_paths:
        - src/wardline/scanner/taint
        - tests/unit/scanner/test_taint.py
    fitness_dimensions: [correctness, conformance]
    notes: >
      The heuristic findings SHOULD be classified as WARNING/STANDARD.
      Document whether the implicit-flow heuristic is implemented.

  - id: WL-FIT-CORE-017
    title: Dependency taint defaults for undeclared functions
    statement: >
      Functions not declared in dependency_taint and not carrying wardline
      annotations MUST receive UNKNOWN_RAW by default. Enforcement tools
      SHOULD validate dependency_taint entries against import resolution at
      scan time.
    normative_sources:
      - file: docs/spec/wardline-01-05-authority-tier-enforcement-spec.md
        section: "5.5 Third-party in-process dependency taint"
    verification:
      method: unit_tests
      target_paths:
        - src/wardline/scanner/taint
        - tests/unit/scanner/test_taint.py
    fitness_dimensions: [correctness, safety]
    notes: >
      CORE-011 covers compound call fallback; this covers the baseline
      default for undeclared functions and import-time validation.
