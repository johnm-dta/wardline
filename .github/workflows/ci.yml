name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: read
  security-events: write

jobs:
  test-unit:
    name: Unit Tests + Lint + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Mypy
        run: uv run mypy src/
      - name: Unit tests with coverage
        run: uv run pytest -m "not integration" --tb=short --cov=wardline --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        if: github.event_name != 'schedule'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"
      - name: Integration tests
        run: uv run pytest -m integration --tb=short

  self-hosting-scan:
    name: Self-Hosting Scan
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"
      - name: Run wardline self-hosting scan
        run: uv run wardline scan src/wardline --manifest wardline.yaml -o results.sarif
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: wardline-self-hosting

  test-network:
    name: Network Tests (Weekly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"
      - name: Network tests
        run: uv run pytest -m network --tb=short -v
